abstraction:
  preflop_buckets: 169        # Lossless (suit isomorphism)
  flop_buckets: 200
  turn_buckets: 200
  river_buckets: 200
  equity_samples: 1000
  histogram_bins: 50

action:
  preflop_raise_sizes: [0.5, 1.0, 2.0]
  flop_bet_sizes: [0.33, 0.5, 0.75, 1.0]
  turn_bet_sizes: [0.5, 0.75, 1.0, 1.5]
  river_bet_sizes: [0.5, 0.75, 1.0, 1.5, 2.0]
  include_all_in: true
  max_raises_per_round: 4

training:
  num_iterations: 100000000
  num_threads: 8
  checkpoint_interval: 100000
  checkpoint_dir: "checkpoints"
  dcfr_alpha: 1.5
  dcfr_beta: 0.0
  dcfr_gamma: 2.0

game:
  num_players: 6
  small_blind: 1
  big_blind: 2
  starting_stack: 200         # In chips (100 BB)
